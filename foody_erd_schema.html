
<div id="erd" style="padding: 1rem 0"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#2a2a28' : '#f1efe8',
    primaryBorderColor: dark ? '#4a4a46' : '#b4b2a9',
  },
});

const diagram = `erDiagram
  User {
    Int id PK
    String name
    String email
    String password
    Role role
    Boolean active
  }
  Tenant {
    UUID id PK
    String name
    String slug
    String logoUrl
    String phone
    Int ownerId FK
    Boolean active
  }
  TenantMedia {
    UUID id PK
    UUID tenantId FK
    String kind
    String url
    String mimeType
  }
  Category {
    Int id PK
    String name
    UUID tenantId FK
    Boolean active
  }
  Product {
    Int id PK
    String name
    String description
    Decimal price
    String imageUrl
    Boolean active
    UUID tenantId FK
    Int categoryId FK
  }
  OptionGroup {
    Int id PK
    String name
    Boolean required
    Boolean multiple
    Int min
    Int max
    Int productId FK
  }
  Option {
    Int id PK
    String name
    Decimal priceModifier
    Int groupId FK
  }
  Table {
    Int id PK
    Int number
    UUID tenantId FK
  }
  Order {
    Int id PK
    UUID tenantId FK
    Int userId FK
    Int tableId FK
    OrderType type
    OrderStatus status
    Decimal total
    String notes
    String customerName
    String customerPhone
    String customerAddress
  }
  OrderItem {
    Int id PK
    Int orderId FK
    Int productId FK
    Int quantity
    Decimal unitPrice
    String notes
  }
  OrderItemOption {
    Int id PK
    Int orderItemId FK
    Int optionId FK
    Int quantity
    Decimal priceAdded
  }

  User ||--o{ Tenant : "owns"
  User ||--o{ Order : "places"
  Tenant ||--o{ TenantMedia : "has"
  Tenant ||--o{ Category : "has"
  Tenant ||--o{ Product : "has"
  Tenant ||--o{ Table : "has"
  Tenant ||--o{ Order : "receives"
  Category ||--o{ Product : "groups"
  Product ||--o{ OptionGroup : "has"
  Product ||--o{ OrderItem : "referenced in"
  OptionGroup ||--o{ Option : "contains"
  Table ||--o{ Order : "source of"
  Order ||--o{ OrderItem : "contains"
  OrderItem ||--o{ OrderItemOption : "has"
  Option ||--o{ OrderItemOption : "chosen in"
`;

const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
